<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بازی‌ها - NHDownload</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      overflow-x: hidden;
      direction: rtl;
    }
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }
    .container {
      padding-top: 100px;
      position: relative;
      z-index: 1;
    }
    h1 {
      text-align: center;
      color: #001f3f;
      margin-top: 20px;
    }
    .game-item {
      width: 80%;
      max-width: 600px;
      margin: 20px auto;
      background-color: #00aaff;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: background-color 0.3s;
    }
    .game-item:hover {
      background-color: #007acc;
    }
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
    }
    .game-header .game-name {
      flex: 1;
    }
    .game-header .game-icon {
      width: 50px;
      height: 50px;
      background-color: #001f3f;
      border-radius: 5px;
      margin-left: 10px;
      background-size: cover;
      background-position: center;
    }
    .game-details {
      margin-top: 15px;
      background-color: #f0f0f0;
      border-radius: 10px;
      padding: 10px;
      display: none;
    }
    .game-images {
      display: flex;
      overflow-x: auto;
    }
    .game-images img {
      width: 100px;
      height: 100px;
      margin-right: 10px;
      border-radius: 5px;
    }
    .download-box {
      margin-top: 10px;
      text-align: center;
    }
    .download-box button {
      background-color: #001f3f;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  
  <div class="container">
    <h1>بازی‌ها</h1>
    <div id="gameList"></div>
  </div>
  
  <script>
    // کد پس‌زمینه مشابه
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      drawBackground();
    }
    window.addEventListener('resize', resizeCanvas);
    function drawBackground() {
      ctx.fillStyle = "#d0e7ff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < 15; i++) {
        let x = Math.random() * canvas.width;
        let y = Math.random() * canvas.height;
        let radius = Math.random() * 80 + 20;
        let gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
        gradient.addColorStop(0, "rgba(0, 90, 180, 0.5)");
        gradient.addColorStop(1, "rgba(0, 90, 180, 0)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    resizeCanvas();
    
    // آرایه اطلاعات بازی‌ها
    const games = [
      {
        name: "بازی اول",
        icon: "icon-game.png",
        images: ["game-screenshot1.png", "game-screenshot2.png", "game-screenshot3.png"],
        description: "توضیحات درباره بازی اول",
        downloadLink: "https://example.com/game-download1"
      },
      {
        name: "بازی دوم",
        icon: "icon-game2.png",
        images: ["game-screenshot4.png", "game-screenshot5.png"],
        description: "توضیحات درباره بازی دوم",
        downloadLink: "https://example.com/game-download2"
      }
      // برای افزودن بازی جدید، یک شیء جدید به آرایه اضافه کنید.
    ];
    
    function renderGames() {
      let container = document.getElementById("gameList");
      let html = "";
      games.forEach((game, index) => {
        html += `
          <div class="game-item">
            <div class="game-header" onclick="toggleGameDetails(${index})">
              <div class="game-name">${game.name}</div>
              <div class="game-icon" style="background-image: url('${game.icon}');"></div>
            </div>
            <div class="game-details" id="gdetails-${index}">
              <div class="game-images">
                ${game.images.map(img => `<img src="${img}" alt="تصویر">`).join('')}
              </div>
              <p>${game.description}</p>
              <div class="download-box">
                <a href="${game.downloadLink}" target="_blank">
                  <button>دانلود</button>
                </a>
              </div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }
    
    function toggleGameDetails(index) {
      const details = document.getElementById("gdetails-" + index);
      if(details.style.display === "none" || details.style.display === "") {
        details.style.display = "block";
      } else {
        details.style.display = "none";
      }
    }
    
    renderGames();
  </script>
</body>
</html>
